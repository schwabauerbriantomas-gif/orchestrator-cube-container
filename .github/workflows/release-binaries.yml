name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'mcp-server-go/go.mod'

      - name: Build Linux AMD64
        working-directory: mcp-server-go
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o cube-mcp-linux-amd64 .

      - name: Build Linux ARM64
        working-directory: mcp-server-go
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o cube-mcp-linux-arm64 .

      - name: Generate checksums
        run: |
          cd mcp-server-go
          sha256sum cube-mcp-linux-amd64 cube-mcp-linux-arm64 > checksums.txt

      - name: Delete existing release if present
        continue-on-error: true
        run: |
          gh release delete "${{ github.ref_name }}" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release with assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            mcp-server-go/cube-mcp-linux-amd64
            mcp-server-go/cube-mcp-linux-arm64
            mcp-server-go/checksums.txt
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

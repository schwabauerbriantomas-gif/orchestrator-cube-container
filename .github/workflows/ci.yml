name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  mcp-server:
    name: MCP Server (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25.12"]
    defaults:
      run:
        working-directory: mcp-server-go

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: mcp-server-go/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build (CGO disabled, static binary)
        run: CGO_ENABLED=0 go build -v .

      - name: Vet
        run: go vet ./...

      - name: Tests (race detector)
        run: go test -v -race -timeout=60s ./...

      - name: Tests (e2e + benchmarks)
        run: go test -tags=e2e -v -timeout=60s -count=1 ./...

      - name: Verify tool count matches README
        run: |
          # Ensure tools_registration.go registers exactly 178 tools
          TOOL_COUNT=$(grep -c 'registerTool(s,' tools_registration.go)
          EXPECTED=178
          if [ "$TOOL_COUNT" != "$EXPECTED" ]; then
            echo "::error::Tool count mismatch: tools_registration.go has $TOOL_COUNT tools, README claims $EXPECTED"
            echo "Update README.md badge and tool reference table, or fix the registration."
            exit 1
          fi
          echo "::notice::Tool count verified: $TOOL_COUNT tools"

      - name: Check no binaries committed
        run: |
          # Detect accidentally committed binary files in the source tree
          find . -name "*.go" -exec file {} \; | grep -i "elf\|executable\|mach-o\|pe32" && {
            echo "::error::Binary file found in source tree"
            exit 1
          } || true

  go-build:
    name: Go Components (Cubelet + CubeMaster)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        component: [Cubelet, CubeMaster]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: ${{ matrix.component }}/go.mod
          cache-dependency-path: ${{ matrix.component }}/go.sum

      - name: Build binaries
        working-directory: ${{ matrix.component }}
        env:
          CGO_ENABLED: "0"
        run: |
          for cmd in cmd/*/; do
            echo "::group::Building $cmd"
            go build -v ./"$cmd" || echo "::warning::Skipped $cmd (no main or build error)"
          done

      - name: Vet
        working-directory: ${{ matrix.component }}
        env:
          CGO_ENABLED: "0"
        run: |
          # Run go vet on cmd/ only (our code). pkg/ is legacy Tencent
          # with pre-existing vet warnings (lock copies, printf format)
          # that we track but don't fix in fork code.
          # CGO_ENABLED=0 avoids cubecow.h compilation error (CGO package).
          go vet ./cmd/... 2>&1 || {
            echo "::error::go vet found issues in ${{ matrix.component }}/cmd/"
            exit 1
          }

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build image (standard docker build)
        run: |
          docker build -f deploy/container-mode/Dockerfile -t cube-container:ci . \
            && docker image ls cube-container:ci \
            && echo "::notice::Image built successfully"

  security-checks:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Gosec (Go SAST)
        uses: securego/gosec@d2d3ae66bd8d340b78b5142b6fe610691783c2fe # v2.22.5
        with:
          # -no-fail: gosec v2.22.x has an SSA analyzer panic bug on the
          # main package. -no-fail lets the SARIF still generate despite
          # the panic. We then enforce severity in the next step.
          #
          # Excluded rules (all triaged as false positives for a container
          # orchestrator that executes commands and manages files by design):
          #   G104: audit errors not checked (we handle important ones explicitly)
          #   G101: hardcoded credentials (fires on path strings containing "secret")
          #   G107: HTTP request with variable URL (webhook URLs are validated)
          #   G108: math/rand used for non-crypto purposes (already addressed)
          #   G204: subprocess launched with variable (exec.Command args are validated)
          #   G301: directory perms 0755 → wants 0750 (acceptable for data dirs)
          #   G302: file perms 0644 → wants 0600 (config files, not secrets)
          #   G304: file path from variable (validated by our path validators)
          #   G306: WriteFile perms 0644 → wants 0600 (config, not secrets)
          #   G402: TLS config (fires on import guard `var _ = tls.Config{}`)
          #   G505: crypto/sha1 blocklisted (required by RFC 6238 TOTP — all
          #         authenticator apps use HMAC-SHA1; not used for password hashing)
          #   G110: decompression bomb (fixed — now uses io.LimitReader)
          #   G115: integer overflow (fixed — now masks to 12 bits + #nosec)
          #   G305: file traversal (validated by path.Clean + prefix check)
          #   G122: TOCTOU in WalkDir (fixed — EvalSymlinks check before read)
          #   G703: path traversal via taint (fixed — path validation + cleaning)
          #   G704: SSRF via taint (fixed — dockerAPIPathRe validates API paths)
          #   G705: XSS via taint (fixed — validateContainerID before SSE output)
          args: -no-fail -fmt sarif -out gosec-results.sarif -exclude-dir=Cubelet -exclude-dir=CubeMaster -exclude=G104,G101,G107,G108,G204,G301,G302,G304,G306,G402,G505,G110,G115,G305,G122,G703,G704,G705 ./mcp-server-go/...

      - name: Enforce gosec severity (fail on HIGH/CRITICAL)
        run: |
          # Parse SARIF and fail if any HIGH or CRITICAL findings remain
          # after exclusions. This catches NEW vulnerabilities introduced
          # by future commits while tolerating gosec's SSA panic bug.
          if [ ! -f gosec-results.sarif ]; then
            echo "::error::gosec SARIF output not found"
            exit 1
          fi
          python3 -c "
          import json, sys
          with open('gosec-results.sarif') as f:
              sarif = json.load(f)
          severe = []
          for run in sarif.get('runs', []):
              for result in run.get('results', []):
                  level = result.get('level', 'note')
                  if level in ('error', 'warning'):
                      rule_id = result.get('ruleId', 'unknown')
                      msg = result.get('message', {}).get('text', '')[:120]
                      loc = result.get('locations', [{}])[0].get('physicalLocation', {})
                      artifact = loc.get('artifactLocation', {}).get('uri', '?')
                      line = loc.get('region', {}).get('startLine', '?')
                      severe.append(f'  {rule_id} [{level}] {artifact}:{line} — {msg}')
          if severe:
              print('HIGH/CRITICAL gosec findings found:')
              for s in severe:
                  print(s)
              print(f'\nTotal: {len(severe)} findings')
              sys.exit(1)
          else:
              print('No HIGH/CRITICAL findings — all clear')
          "

      - name: Govulncheck (MCP server only)
        uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1
        with:
          go-version-input: "1.25.12"
          work-dir: mcp-server-go

      - name: Govulncheck SARIF (filtered)
        run: |
          cd mcp-server-go && go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -format sarif ./... > ../govulncheck-raw.sarif || true
          # Drop module-level-only findings (level=note, no call path).
          # govulncheck reports these for modules like x/crypto that contain
          # deprecated packages (e.g. openpgp) even when only a safe
          # sub-package (e.g. argon2) is imported. No fix version exists.
          jq '(.runs[].results |= map(select(
            .level != "note" or (
              (.message.text | ascii_downcase | test("call")) | not
            )
          )))' ../govulncheck-raw.sarif > ../govulncheck.sarif

      - name: Upload Gosec SARIF
        if: always() && hashFiles('gosec-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: gosec-results.sarif

      - name: Upload Govulncheck SARIF
        if: always() && hashFiles('govulncheck.sarif') != ''
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: govulncheck.sarif
          category: govulncheck

  binary-guard:
    name: No Binaries in Repo
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Detect committed binaries
        run: |
          FOUND=0
          for dir in mcp-server-go Cubelet CubeMaster cubelog deploy; do
            if [ -d "$dir" ]; then
              while IFS= read -r -d '' f; do
                TYPE=$(file -b "$f")
                case "$TYPE" in
                  *ELF*|*Mach-O*|*PE32*)
                    echo "::error file=$f::Binary executable detected: $f"
                    FOUND=1
                    ;;
                  *executable*)
                    case "$TYPE" in
                      *text*|*script*|*ASCII*|*UTF-8*)
                        ;;
                      *)
                        echo "::error file=$f::Binary executable detected: $f"
                        FOUND=1
                        ;;
                    esac
                    ;;
                esac
              done < <(find "$dir" -type f ! -name "*.go" ! -name "*.sum" ! -name "*.mod" ! -name "*.md" ! -name "*.toml" ! -path "*/contrib/*" -print0)
            fi
          done
          if [ "$FOUND" = "1" ]; then
            exit 1
          fi
          echo "::notice::No binary files found"
